<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>LMS Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/inter-ui/3.19.3/inter.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#1a1c23] min-h-screen text-[#e2e8f0] font-[Inter,sans-serif]">
  <nav class="border-b border-gray-700 bg-[#252830] p-4 shrink-0 flex items-center justify-between sticky top-0 z-50">
    <a href="/" class="flex items-center space-x-2">
      <span class="text-2xl font-bold"><span class="text-[#00e699]">LMS</span> <span class="text-white">Platform</span></span>
    </a>
    
    <div class="flex items-center space-x-4">
      {% if user.is_authenticated %}
        <div class="hidden sm:flex flex-col items-end mr-2">
            <span class="text-xs text-gray-400 capitalize">{{ user.role }}</span>
            <span class="text-sm font-medium text-white">{{ user.get_full_name|default:user.username }}</span>
        </div>
        <a href="{% url 'auth:logout' %}" class="text-red-400 hover:text-red-300 transition p-2">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </a>
      {% else %}
        <a href="{% url 'auth:login' %}" class="bg-[#00e699] text-black px-6 py-2 rounded-xl text-sm font-bold hover:shadow-[0_0_15px_rgba(0,230,153,0.4)] transition">
            Kirish
        </a>
      {% endif %}
    </div>
  </nav>

  <div class="container mx-auto p-4 max-w-6xl mt-6">
    {% if messages %}
      {% for msg in messages %}
        <div class="{% if msg.tags == 'success' %}bg-green-500/10 border-green-500/50 text-green-400{% elif msg.tags == 'error' %}bg-red-500/10 border-red-500/50 text-red-400{% else %}bg-blue-500/10 border-blue-500/50 text-blue-400{% endif %} border px-4 py-3 rounded-xl relative mb-6 flex items-center">
          <i class="fa-solid {% if msg.tags == 'success' %}fa-circle-check{% elif msg.tags == 'error' %}fa-circle-exclamation{% else %}fa-circle-info{% endif %} mr-3"></i>
          {{ msg }}
        </div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
