<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS | Emailni Tasdiqlash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-2 text-center text-gray-800">Kodni kiriting</h2>
        <p class="text-gray-500 mb-6 text-sm text-center">Raqamingiz/Emailingizga yuborilgan 6 xonali maxfiy kodni kiriting.</p>
        
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{% url 'verify_email' %}">
            {% csrf_token %}
            <div class="mb-6">
                <input type="text" name="code" maxlength="6" autocomplete="off" class="shadow appearance-none border rounded w-full py-4 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center text-3xl tracking-[10px] font-mono" required placeholder="000000">
            </div>
            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded w-full focus:outline-none focus:shadow-outline transition duration-300">
                Tasdiqlash
            </button>
        </form>
    </div>
</body>
</html>
