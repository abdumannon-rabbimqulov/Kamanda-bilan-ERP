<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Vazifani Baholash - LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #1a1c23; color: #e2e8f0; font-family: Inter, sans-serif; }
    .card-bg { background-color: #252830; }
    .text-mint { color: #00e699; }
    .bg-mint { background-color: #00e699; }
  </style>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/inter-ui/3.19.3/inter.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

  <div class="max-w-2xl w-full">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-2xl font-bold text-white tracking-tight">Vazifani baholash</h1>
        <a href="{% url 'homework:list' hw.lesson.group.id %}" class="text-gray-400 hover:text-white transition text-sm">Orqaga</a>
    </div>

    <!-- Info Card -->
    <div class="card-bg p-6 rounded-3xl border border-gray-700 shadow-xl mb-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center font-bold text-purple-800 text-lg">
          {{ hw.student.first_name|first|upper }}
        </div>
        <div>
          <p class="text-white font-bold">{{ hw.student.get_full_name|default:hw.student.username }}</p>
          <p class="text-gray-500 text-xs">Yuborilgan: {{ hw.submitted_at|date:"d-M, H:i" }}</p>
        </div>
      </div>
      <div>
        {% if hw.file %}
        <a href="{{ hw.file.url }}" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2 shadow-lg">
          <i class="fa-solid fa-download"></i> Faylni yuklash
        </a>
        {% endif %}
      </div>
    </div>

    <!-- Grading Form -->
    <form method="POST" class="card-bg p-8 rounded-3xl border border-gray-700 shadow-2xl space-y-6">
      {% csrf_token %}
      
      <div>
        <label class="block text-gray-400 text-xs font-bold uppercase tracking-widest mb-3">Baho (0-100)</label>
        <input type="number" name="grade" value="{{ hw.grade|default:'' }}" min="0" max="100" required placeholder="Masalan: 85"
          class="w-full bg-[#1a1c23] border border-gray-600 rounded-xl px-4 py-4 text-white text-2xl font-black outline-none focus:border-mint transition text-center">
      </div>

      <div>
        <label class="block text-gray-400 text-xs font-bold uppercase tracking-widest mb-2">Fikr va tavsiyalar</label>
        <textarea name="feedback" rows="4" placeholder="O'quvchi uchun izoh qoldiring..."
          class="w-full bg-[#1a1c23] border border-gray-600 rounded-xl px-4 py-3 text-white outline-none focus:border-mint transition">{{ hw.feedback }}</textarea>
      </div>

      <button type="submit" class="w-full bg-mint text-green-900 font-black py-4 rounded-xl shadow-lg hover:bg-[#00cc88] transition transform active:scale-95">
        BAHONI SAQLASH
      </button>
    </form>
  </div>

</body>
</html>
