<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Darsni Boshlash | LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --mint: #00e699; --bg-dark: #0f1115; }
    body { background: var(--bg-dark); color: #e2e8f0; font-family: 'Outfit', sans-serif; }
    .glass-card { 
      background: rgba(30, 32, 40, 0.7); 
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(255,255,255,0.05); 
    }
    .text-mint { color: var(--mint); }
    .bg-mint { background-color: var(--mint); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

  <div class="max-w-xl w-full">
    <div class="text-center mb-10">
      <div class="w-20 h-20 bg-mint/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-mint/20 shadow-[0_0_30px_rgba(0,230,153,0.1)]">
        <i class="fa-solid fa-play text-3xl text-mint"></i>
      </div>
      <h1 class="text-3xl font-black text-white tracking-tight mb-2">Darsni Boshlash</h1>
      <p class="text-gray-500 font-medium">Boshlashdan oldin mavzuni tasdiqlang</p>
    </div>

    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for msg in messages %}
           <div class="bg-red-500/10 border border-red-500/20 text-red-500 p-4 rounded-2xl text-sm font-bold flex items-center gap-3">
              <i class="fa-solid fa-circle-exclamation"></i> {{ msg }}
           </div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST" class="glass-card p-8 rounded-3xl space-y-8">
      {% csrf_token %}
      
      <div class="space-y-4">
        <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-calendar-day text-gray-500"></i>
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Sana: {{ lesson.date|date:"d-F, Y" }}</span>
          </div>
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-clock text-gray-500"></i>
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Vaqt: {{ lesson.group.lesson_start_time }}</span>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Dars Mavzusi (Tuzatishingiz mumkin)</label>
          <input type="text" name="title" value="{{ lesson.title }}" required 
                 class="w-full bg-black/40 border border-white/5 rounded-2xl py-5 px-6 text-white text-lg font-bold focus:outline-none focus:border-mint transition shadow-inner">
        </div>
      </div>

      <div class="flex gap-4">
        <a href="{% url 'dashboard:teacher' %}" class="flex-1 bg-white/5 text-white font-black py-4 rounded-2xl text-center hover:bg-white/10 transition uppercase tracking-widest text-[10px] border border-white/5">
          Bekor Qilish
        </a>
        <button type="submit" class="flex-[2] bg-mint text-black font-black py-4 rounded-2xl shadow-[0_0_20px_rgba(0,230,153,0.3)] hover:shadow-[0_0_30px_rgba(0,230,153,0.5)] transition transform active:scale-95 uppercase tracking-widest text-xs">
          Hozir Boshlash
        </button>
      </div>
    </form>

    <p class="text-center text-gray-600 text-[10px] uppercase font-black tracking-widest mt-8">
      <i class="fa-solid fa-shield-halved mr-1"></i> Tizim dars vaqtini avtomatik tekshiradi
    </p>
  </div>

</body>
</html>
