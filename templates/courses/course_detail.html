{% extends 'base.html' %}
{% block content %}
<div class="bg-white rounded shadow p-8">
    <h1 class="text-4xl font-bold mb-4">{{ course.title }}</h1>
    <p class="text-gray-700 mb-6">{{ course.description }}</p>
    <div class="mb-6">
        <p><strong>Narxi:</strong> {{ course.price }} UZS</p>
        <p><strong>O'qituvchi:</strong> {{ course.teacher.get_full_name|default:course.teacher.email }}</p>
        <p><strong>Toifa:</strong> {{ course.category }}</p>
    </div>
    
    <form action="{% url 'courses:enroll' course.id %}" method="POST">
        {% csrf_token %}
        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded text-lg">Kursga yozilish</button>
    </form>
</div>
{% endblock %}
