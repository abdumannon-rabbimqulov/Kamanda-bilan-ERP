{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto py-10">
    <div class="bg-[#252830] rounded-2xl border border-gray-700 p-8 shadow-2xl">
        <div class="flex items-center space-x-4 mb-8">
            <div class="w-12 h-12 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-500">
                <i class="fa-solid fa-stop-circle text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white">Darsni Yakunlash</h1>
                <p class="text-gray-400 text-sm">{{ lesson.group.name }} — {{ lesson.title }}</p>
            </div>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-gray-300 text-sm font-bold mb-2">Uyga Vazifa (Tavsif)</label>
                <textarea name="homework_task" rows="4" class="w-full bg-[#1a1c23] border border-gray-600 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-[#00e699] transition" placeholder="Vazifa haqida batafsil ma'lumot qoldiring...">{{ lesson.homework_task|default:'' }}</textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-gray-300 text-sm font-bold mb-2">Video Resource (Ixtiyoriy)</label>
                    <div class="relative">
                        <input type="file" name="homework_video" accept="video/*" class="hidden" id="hw_video">
                        <label for="hw_video" class="w-full bg-[#1a1c23] border border-dashed border-gray-600 text-gray-400 rounded-xl px-4 py-6 flex flex-col items-center justify-center cursor-pointer hover:border-[#00e699] hover:text-white transition">
                            <i class="fa-solid fa-video mb-2 text-xl"></i>
                            <span class="text-xs uppercase font-bold tracking-widest">Video yuklash</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-bold mb-2">Rasm Resource (Ixtiyoriy)</label>
                    <div class="relative">
                        <input type="file" name="homework_image" accept="image/*" class="hidden" id="hw_image">
                        <label for="hw_image" class="w-full bg-[#1a1c23] border border-dashed border-gray-600 text-gray-400 rounded-xl px-4 py-6 flex flex-col items-center justify-center cursor-pointer hover:border-[#00e699] hover:text-white transition">
                            <i class="fa-solid fa-image mb-2 text-xl"></i>
                            <span class="text-xs uppercase font-bold tracking-widest">Rasm yuklash</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-1 uppercase tracking-widest">
                    Darsni Yakunlash va Vazifa Berish
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Simple file name display logic if needed
    document.querySelectorAll('input[type="file"]').forEach(input => {
        input.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                const label = this.nextElementSibling;
                label.querySelector('span').textContent = this.files[0].name;
                label.classList.add('border-[#00e699]', 'text-[#00e699]');
            }
        });
    });
</script>
{% endblock %}
