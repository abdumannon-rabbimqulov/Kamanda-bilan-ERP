{% extends 'base.html' %}
{% block content %}
<h1 class="text-3xl font-bold mb-6">Barcha Kurslar</h1>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for course in courses %}
    <div class="bg-white rounded shadow hover:shadow-md transition">
        <div class="p-6">
            <h2 class="text-xl font-bold mb-2">{{ course.title }}</h2>
            <p class="text-gray-600 text-sm mb-4 truncate">{{ course.description }}</p>
            <p class="text-lg font-semibold text-indigo-600 mb-4">{{ course.price }} UZS</p>
            <a href="{% url 'courses:detail' course.id %}" class="block text-center bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 rounded">Batafsil</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
