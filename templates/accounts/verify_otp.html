{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border rounded shadow-sm mt-10">
    <h2 class="text-2xl font-bold mb-4 text-center">Tasdiqlash kodi</h2>
    <p class="text-gray-600 mb-6 text-center text-sm">Biz sizning emailingizga 6 xonali kod yubordik. Pastga kiriting.</p>
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="mb-6">
            <input type="text" name="code" placeholder="000000" class="w-full text-center text-2xl tracking-widest border rounded p-3 focus:outline-none focus:ring focus:ring-indigo-200">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 rounded hover:bg-indigo-700">Tasdiqlash</button>
    </form>
</div>
{% endblock %}
